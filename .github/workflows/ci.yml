name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: securefs
          POSTGRES_USER: securefs_user
          POSTGRES_PASSWORD: securefs_password
        ports:
          - 5431:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Apply database baseline
        run: psql -h localhost -p 5431 -U securefs_user -d securefs -f server/migrations/V1__baseline.sql
        env:
          PGPASSWORD: securefs_password

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace
        env:
          DB_PASS: securefs

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # The s3 blob backend is an opt-in feature (object storage pulls a second
      # rustls provider), so lint and unit-test it explicitly. Only the blobstore
      # tests run under s3; the object-store round-trip skips without a live
      # endpoint (SFX_S3_TEST_ENDPOINT), and the InMemory tests cover the mapping.
      - name: cargo clippy (s3 feature)
        run: |
          cargo clippy -p securefs-blobstore --features s3 --all-targets -- -D warnings
          cargo clippy -p securefs-server --features s3 --all-targets -- -D warnings

      - name: cargo test (s3 feature)
        run: cargo test -p securefs-blobstore --features s3

      - name: cargo fmt
        run: cargo fmt --all -- --check
